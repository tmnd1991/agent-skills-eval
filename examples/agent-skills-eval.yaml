root: ./examples
workspace: ./agent-skills-workspace
baseline: true
target: gpt-4o-mini
judge: gpt-4o-mini
baseUrl: https://api.openai.com/v1
apiKeyEnv: OPENAI_API_KEY
include:
  - "basic-skill"
concurrency: 2
layout: iteration
strict: true
report:
  enabled: true
  title: Example Agent Skills Report
